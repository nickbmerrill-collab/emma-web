<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMMA - 2M Electrical AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #0f3460;
        }
        header img { width: 40px; height: 40px; }
        header h1 { font-size: 24px; font-weight: 700; }
        .status { 
            margin-left: auto; 
            display: flex; 
            align-items: center; 
            gap: 8px;
            font-size: 14px;
            color: #888;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #e94560;
        }
        .status-dot.connected { background: #00d9ff; }
        
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 250px;
            background: #16213e;
            padding: 20px;
            border-right: 1px solid #0f3460;
            overflow-y: auto;
        }
        .sidebar h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 10px;
        }
        .sidebar button {
            display: block;
            width: 100%;
            padding: 10px 15px;
            background: transparent;
            border: none;
            color: #ccc;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 5px;
        }
        .sidebar button:hover { background: #0f3460; }
        
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .message.user {
            align-self: flex-end;
            background: #e94560;
            color: white;
        }
        .message.emma {
            align-self: flex-start;
            background: #0f3460;
        }
        .message .role {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 5px;
        }
        
        .input-area {
            padding: 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            font-size: 16px;
        }
        .input-area input:focus { outline: 2px solid #e94560; }
        .input-area button {
            padding: 15px 30px;
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .input-area button:hover { background: #ff6b6b; }
        
        .kb-panel {
            width: 300px;
            background: #16213e;
            border-left: 1px solid #0f3460;
            padding: 20px;
            overflow-y: auto;
        }
        .kb-panel h3 {
            font-size: 14px;
            margin-bottom: 15px;
            color: #00d9ff;
        }
        .kb-result {
            background: #0f3460;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .kb-result:hover { background: #1a4a7a; }
        .kb-result h4 {
            font-size: 13px;
            margin-bottom: 5px;
        }
        .kb-result .score {
            font-size: 11px;
            color: #00d9ff;
        }
    </style>
</head>
<body>
    <header>
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" stroke="#00d9ff" stroke-width="2"/>
            <circle cx="20" cy="14" r="4" fill="#e94560"/>
            <circle cx="14" cy="24" r="3" fill="#00d9ff"/>
            <circle cx="26" cy="24" r="3" fill="#00d9ff"/>
        </svg>
        <h1>EMMA</h1>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
            <span>•</span>
            <span id="chunkCount">-- chunks</span>
        </div>
    </header>
    
    <div class="container">
        <div class="sidebar">
            <h3>Quick Actions</h3>
            <button onclick="quickAsk('new project')">+ New Project</button>
            <button onclick="quickAsk('search knowledge base')">🔍 Search KB</button>
            <button onclick="quickAsk('build BOM for office')">📋 Build BOM</button>
            
            <h3 style="margin-top: 20px">Products</h3>
            <button onclick="quickAsk('Wiremold floor boxes')">▣ Wiremold</button>
            <button onclick="quickAsk('Cablofil cable tray')">▦ Cablofil</button>
            <button onclick="quickAsk('Power Bus Way commission')">⚡ Power Bus Way</button>
            <button onclick="quickAsk('Connectrac floor raceway')">↔ Connectrac</button>
            
            <h3 style="margin-top: 20px">Projects</h3>
            <button onclick="quickAsk('Vantage TX12 status')">▦ Vantage TX12</button>
            <button onclick="quickAsk('Tesla manufacturing')">▦ Tesla</button>
            <button onclick="quickAsk('QTS data center')">▦ QTS DFW</button>
        </div>
        
        <div class="main">
            <div class="messages" id="messages">
                <div class="message emma">
                    <div class="role">EMMA</div>
                    Hello! I'm EMMA, your AI assistant for 2M Electrical Representatives. I have access to 84,307+ chunks of knowledge about our products, projects, pricing, and contacts. How can I help you today?
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="input" placeholder="Ask EMMA anything..." onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
        
        <div class="kb-panel" id="kbPanel" style="display:none">
            <h3>📚 Knowledge Base Results</h3>
            <div id="kbResults"></div>
        </div>
    </div>
    
    <script>
        let token = null;
        const API = 'http://localhost:8000';
        
        async function login() {
            try {
                const res = await fetch(`${API}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email: 'admin@2mreps.com', password: 'admin1234'})
                });
                const data = await res.json();
                token = data.access_token;
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('statusText').textContent = 'Connected';
                
                // Get KB count
                const statsRes = await fetch(`${API}/api/v1/knowledge/stats`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                if (statsRes.ok) {
                    const stats = await statsRes.json();
                    document.getElementById('chunkCount').textContent = stats.totalChunks + ' chunks';
                }
            } catch(e) {
                document.getElementById('statusText').textContent = 'Disconnected';
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            if (!msg) return;
            
            addMessage(msg, 'user');
            input.value = '';
            
            // Show typing
            const typingId = addMessage('Thinking...', 'emma');
            
            try {
                // Search KB first
                const searchRes = await fetch(`${API}/api/v1/ai/knowledge/search`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({query: msg, maxResults: 3})
                });
                
                if (searchRes.ok) {
                    const searchData = await searchRes.json();
                    showKBResults(searchData.knowledge_articles || []);
                }
                
                // Get AI response
                const res = await fetch(`${API}/api/v1/ai/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({message: msg})
                });
                
                if (res.ok) {
                    const data = await res.json();
                    removeMessage(typingId);
                    addMessage(data.content || 'No response', 'emma');
                } else {
                    removeMessage(typingId);
                    addMessage('Error getting response', 'emma');
                }
            } catch(e) {
                removeMessage(typingId);
                addMessage('Error: ' + e.message, 'emma');
            }
        }
        
        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="role">${role === 'user' ? 'You' : 'EMMA'}</div>${text}`;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView();
            return div;
        }
        
        function removeMessage(el) {
            if (el) el.remove();
        }
        
        function showKBResults(results) {
            const panel = document.getElementById('kbPanel');
            const container = document.getElementById('kbResults');
            
            if (results.length === 0) {
                panel.style.display = 'none';
                return;
            }
            
            panel.style.display = 'block';
            container.innerHTML = results.map(r => `
                <div class="kb-result" onclick="document.getElementById('input').value='${r.title}';document.getElementById('input').focus()">
                    <h4>${r.title}</h4>
                    <div class="score">Relevance: ${Math.round(r.score * 100)}%</div>
                </div>
            `).join('');
        }
        
        function quickAsk(q) {
            document.getElementById('input').value = q;
            sendMessage();
        }
        
        login();
    </script>
</body>
</html>
